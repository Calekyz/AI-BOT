<!DOCTYPE html>
<html lang="en" dir="auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ProTrader AI | Professional Trading Platform</title>
    
    <!-- Firebase SDKs -->
    <script type="module">
        // Import Firebase modules
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, where, getDocs, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
        
        // ===== REPLACE WITH YOUR FIREBASE CONFIG =====
        // Go to Firebase Console → Project Settings → General → Your apps
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // Make available globally
        window.auth = auth;
        window.db = db;
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
        window.signOut = signOut;
        window.onAuthStateChanged = onAuthStateChanged;
        window.doc = doc;
        window.setDoc = setDoc;
        window.getDoc = getDoc;
        window.updateDoc = updateDoc;
        window.serverTimestamp = serverTimestamp;
        window.collection = collection;
        window.query = query;
        window.where = where;
        window.getDocs = getDocs;
        window.addDoc = addDoc;
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #2962ff;
            --primary-dark: #0039cb;
            --secondary: #7c4dff;
            --success: #00c853;
            --danger: #ff3d00;
            --warning: #ffd600;
            --dark-bg: #0a0c10;
            --card-bg: #1a1d24;
            --border: #2c3038;
            --text-primary: #ffffff;
            --text-secondary: #8a8f99;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui;
            background: linear-gradient(135deg, #0a0c10 0%, #14161c 100%);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Auth Container */
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 40px 30px;
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-logo h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-logo p {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 8px;
        }

        .auth-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .auth-tab.active {
            color: var(--primary);
        }

        .auth-tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--primary);
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-auth {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-auth:active {
            transform: scale(0.98);
        }

        .error-message {
            color: var(--danger);
            font-size: 0.8rem;
            margin-top: 8px;
            display: none;
        }

        .success-message {
            color: var(--success);
            font-size: 0.8rem;
            margin-top: 8px;
            display: none;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Dashboard */
        .dashboard-container {
            display: none;
            padding-bottom: 80px;
        }

        .dashboard-header {
            background: rgba(10,12,16,0.95);
            backdrop-filter: blur(20px);
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .dashboard-content {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .user-info {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .plan-badge {
            display: inline-block;
            padding: 4px 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 20px;
            font-size: 0.7rem;
            margin-top: 8px;
        }

        .logout-btn {
            background: rgba(255,61,0,0.2);
            color: var(--danger);
            border: 1px solid rgba(255,61,0,0.3);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-size: 0.9rem;
        }

        .trading-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .signal-card {
            background: rgba(41,98,255,0.1);
            border-radius: 16px;
            padding: 20px;
            margin-top: 15px;
            border-left: 4px solid var(--primary);
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-trading {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-start {
            background: linear-gradient(135deg, var(--success), #009624);
            color: white;
        }

        .btn-stop {
            background: linear-gradient(135deg, var(--danger), #c62800);
            color: white;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <!-- Auth Container -->
    <div class="auth-container" id="authContainer">
        <div class="auth-card">
            <div class="auth-logo">
                <h1>⚡ ProTrader AI</h1>
                <p>Professional Trading Platform</p>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('login')">Login</button>
                <button class="auth-tab" onclick="switchTab('register')">Register</button>
            </div>

            <!-- Login Form -->
            <div class="auth-form active" id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" placeholder="trader@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password">
                </div>
                <div class="error-message" id="loginError"></div>
                <button class="btn-auth" onclick="handleLogin()">Sign In</button>
            </div>

            <!-- Register Form -->
            <div class="auth-form" id="registerForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="regName" placeholder="John Smith">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="regEmail" placeholder="trader@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" placeholder="Min 6 characters">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="regConfirmPassword" placeholder="Confirm password">
                </div>
                <div class="form-group">
                    <label>Select Plan</label>
                    <select id="regPlan">
                        <option value="starter">Starter - $29/month</option>
                        <option value="pro">Pro Trader - $79/month</option>
                        <option value="vip">VIP Elite - $199/month</option>
                    </select>
                </div>
                <div class="error-message" id="registerError"></div>
                <div class="success-message" id="registerSuccess"></div>
                <button class="btn-auth" onclick="handleRegister()">Create Account</button>
            </div>
        </div>
    </div>

    <!-- Dashboard -->
    <div class="dashboard-container" id="dashboardContainer">
        <div class="dashboard-header">
            <div style="display: flex; justify-content: space-between; align-items: center; max-width: 600px; margin: 0 auto;">
                <div>
                    <h2 style="font-size: 1.3rem;">⚡ ProTrader AI</h2>
                    <p style="font-size: 0.7rem; color: var(--text-secondary);" id="userEmailDisplay"></p>
                </div>
                <button onclick="handleLogout()" style="background: rgba(255,61,0,0.2); border: none; padding: 8px 16px; border-radius: 10px; color: var(--danger);">Logout</button>
            </div>
        </div>

        <div class="dashboard-content">
            <div class="user-info">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <strong id="userNameDisplay"></strong>
                        <div><span class="plan-badge" id="userPlanDisplay"></span></div>
                    </div>
                    <div style="text-align: right;">
                        <div id="trialStatus" style="font-size: 0.7rem; color: var(--success);">Active</div>
                    </div>
                </div>
            </div>

            <!-- Trading Bot Interface -->
            <div class="trading-card">
                <div style="text-align: center; margin-bottom: 20px;">
                    <div style="font-size: 0.8rem; color: var(--text-secondary);">TRADING BOT STATUS</div>
                    <div style="font-size: 1.2rem; font-weight: 700; margin-top: 5px;" id="botStatus">● Stopped</div>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="winRate">87.3%</div>
                        <div class="stat-label">Win Rate</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="signalsCount">0</div>
                        <div class="stat-label">Signals Today</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="accuracy">94%</div>
                        <div class="stat-label">Accuracy</div>
                    </div>
                </div>

                <div class="btn-group">
                    <button class="btn-trading btn-start" onclick="startBot()">▶ Start Trading</button>
                    <button class="btn-trading btn-stop" onclick="stopBot()">⏸ Stop</button>
                </div>

                <div id="signalDisplay"></div>
            </div>

            <div class="trading-card">
                <div style="font-weight: 600; margin-bottom: 15px;">📊 Market Data</div>
                <div id="marketData"></div>
            </div>
        </div>
    </div>

    <script type="module">
        // Firebase is already imported from the module script
        // These variables are available globally from the module
        
        let currentUser = null;
        let userData = null;
        let botRunning = false;
        let botInterval = null;
        let signalsToday = 0;
        
        // Make functions global for onclick handlers
        window.switchTab = function(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabs = document.querySelectorAll('.auth-tab');
            
            tabs.forEach(t => t.classList.remove('active'));
            
            if (tab === 'login') {
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
                tabs[0].classList.add('active');
            } else {
                loginForm.classList.remove('active');
                registerForm.classList.add('active');
                tabs[1].classList.add('active');
            }
            
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('registerError').style.display = 'none';
            document.getElementById('registerSuccess').style.display = 'none';
        };
        
        // Handle Login
        window.handleLogin = async function() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            
            if (!email || !password) {
                errorDiv.textContent = 'Please enter email and password';
                errorDiv.style.display = 'block';
                return;
            }
            
            errorDiv.style.display = 'none';
            
            try {
                const userCredential = await window.signInWithEmailAndPassword(window.auth, email, password);
                currentUser = userCredential.user;
                
                // Load user data from Firestore
                const userDoc = await window.getDoc(window.doc(window.db, 'users', currentUser.uid));
                if (userDoc.exists()) {
                    userData = userDoc.data();
                }
                
                showDashboard();
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
            }
        };
        
        // Handle Register
        window.handleRegister = async function() {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const plan = document.getElementById('regPlan').value;
            const errorDiv = document.getElementById('registerError');
            const successDiv = document.getElementById('registerSuccess');
            
            if (!name || !email || !password) {
                errorDiv.textContent = 'Please fill in all fields';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (password !== confirmPassword) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (password.length < 6) {
                errorDiv.textContent = 'Password must be at least 6 characters';
                errorDiv.style.display = 'block';
                return;
            }
            
            errorDiv.style.display = 'none';
            
            try {
                const userCredential = await window.createUserWithEmailAndPassword(window.auth, email, password);
                currentUser = userCredential.user;
                
                // Save user data to Firestore
                const planNames = { starter: 'Starter Plan', pro: 'Pro Trader', vip: 'VIP Elite' };
                const trialEnds = new Date();
                trialEnds.setDate(trialEnds.getDate() + 14);
                
                userData = {
                    uid: currentUser.uid,
                    name: name,
                    email: email,
                    plan: plan,
                    planName: planNames[plan],
                    registeredAt: new Date().toISOString(),
                    trialEnds: trialEnds.toISOString(),
                    isActive: true,
                    signalsGenerated: 0
                };
                
                await window.setDoc(window.doc(window.db, 'users', currentUser.uid), userData);
                
                successDiv.textContent = 'Account created successfully! Redirecting...';
                successDiv.style.display = 'block';
                
                setTimeout(() => {
                    showDashboard();
                }, 1500);
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
            }
        };
        
        // Handle Logout
        window.handleLogout = async function() {
            await window.signOut(window.auth);
            currentUser = null;
            userData = null;
            stopBot();
            document.getElementById('dashboardContainer').style.display = 'none';
            document.getElementById('authContainer').style.display = 'flex';
            
            // Clear forms
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
        };
        
        // Show Dashboard
        async function showDashboard() {
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('dashboardContainer').style.display = 'block';
            
            document.getElementById('userEmailDisplay').textContent = userData.email;
            document.getElementById('userNameDisplay').textContent = userData.name;
            document.getElementById('userPlanDisplay').textContent = userData.planName;
            
            // Check trial status
            const trialEnd = new Date(userData.trialEnds);
            const now = new Date();
            const daysLeft = Math.ceil((trialEnd - now) / (1000 * 60 * 60 * 24));
            
            if (daysLeft > 0) {
                document.getElementById('trialStatus').innerHTML = `${daysLeft} days trial remaining`;
                document.getElementById('trialStatus').style.color = 'var(--success)';
            } else {
                document.getElementById('trialStatus').innerHTML = 'Trial expired - Upgrade';
                document.getElementById('trialStatus').style.color = 'var(--danger)';
            }
            
            // Load signals count
            await loadSignalsCount();
            updateMarketData();
            
            // Update market data every 5 seconds
            setInterval(() => {
                if (currentUser) updateMarketData();
            }, 5000);
        }
        
        // Load signals count from Firestore
        async function loadSignalsCount() {
            const signalsQuery = window.query(
                window.collection(window.db, 'signals'),
                window.where('userId', '==', currentUser.uid),
                window.where('date', '==', new Date().toDateString())
            );
            const snapshot = await window.getDocs(signalsQuery);
            signalsToday = snapshot.size;
            document.getElementById('signalsCount').textContent = signalsToday;
        }
        
        // Save signal to Firestore
        async function saveSignal(signalData) {
            await window.addDoc(window.collection(window.db, 'signals'), {
                userId: currentUser.uid,
                ...signalData,
                timestamp: window.serverTimestamp(),
                date: new Date().toDateString()
            });
            
            // Update user's signal count
            await window.updateDoc(window.doc(window.db, 'users', currentUser.uid), {
                signalsGenerated: (userData.signalsGenerated || 0) + 1
            });
            
            signalsToday++;
            document.getElementById('signalsCount').textContent = signalsToday;
        }
        
        // Update market data
        function updateMarketData() {
            const pairs = [
                { symbol: 'EUR/USD', price: (1.085 + Math.random() * 0.01).toFixed(5), change: (Math.random() - 0.5) * 0.5 },
                { symbol: 'GBP/USD', price: (1.265 + Math.random() * 0.01).toFixed(5), change: (Math.random() - 0.5) * 0.5 },
                { symbol: 'XAU/USD', price: (2035 + Math.random() * 20).toFixed(2), change: (Math.random() - 0.5) * 1 },
                { symbol: 'BTC/USD', price: (62500 + Math.random() * 1000).toFixed(0), change: (Math.random() - 0.5) * 2 }
            ];
            
            const container = document.getElementById('marketData');
            container.innerHTML = pairs.map(pair => `
                <div style="display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border);">
                    <span style="font-weight: 600;">${pair.symbol}</span>
                    <span>${pair.price}</span>
                    <span style="color: ${pair.change >= 0 ? 'var(--success)' : 'var(--danger)'}">
                        ${pair.change >= 0 ? '▲' : '▼'} ${Math.abs(pair.change).toFixed(2)}%
                    </span>
                </div>
            `).join('');
        }
        
        // Start Bot
        window.startBot = function() {
            if (botRunning) return;
            botRunning = true;
            document.getElementById('botStatus').innerHTML = '● Running';
            document.getElementById('botStatus').style.color = 'var(--success)';
            
            botInterval = setInterval(async () => {
                if (Math.random() > 0.85) {
                    const signals = ['BUY', 'SELL'];
                    const pairs = ['EUR/USD', 'GBP/USD', 'BTC/USD', 'XAU/USD'];
                    const signal = signals[Math.floor(Math.random() * signals.length)];
                    const pair = pairs[Math.floor(Math.random() * pairs.length)];
                    const price = pair === 'BTC/USD' ? (60000 + Math.random() * 5000).toFixed(0) : 
                                 pair === 'XAU/USD' ? (2020 + Math.random() * 30).toFixed(2) :
                                 (1.08 + Math.random() * 0.03).toFixed(5);
                    
                    const signalData = {
                        type: signal,
                        pair: pair,
                        entry: price,
                        takeProfit: signal === 'BUY' ? (parseFloat(price) + 0.003).toFixed(5) : (parseFloat(price) - 0.003).toFixed(5),
                        stopLoss: signal === 'BUY' ? (parseFloat(price) - 0.002).toFixed(5) : (parseFloat(price) + 0.002).toFixed(5),
                        confidence: 75 + Math.random() * 20
                    };
                    
                    // Save to Firestore
                    await saveSignal(signalData);
                    
                    const display = document.getElementById('signalDisplay');
                    display.innerHTML = `
                        <div class="signal-card" style="border-left-color: ${signal === 'BUY' ? 'var(--success)' : 'var(--danger)'}">
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <strong style="font-size: 1.2rem;">${signal} SIGNAL</strong>
                                <span>${pair}</span>
                            </div>
                            <div style="font-size: 1.8rem; font-weight: 700; margin: 10px 0;">${price}</div>
                            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; font-size: 0.8rem;">
                                <div>TP: ${signalData.takeProfit}</div>
                                <div>SL: ${signalData.stopLoss}</div>
                            </div>
                            <div style="font-size: 0.7rem; color: var(--text-secondary); margin-top: 10px;">
                                Confidence: ${signalData.confidence.toFixed(0)}% | Signal ID: ${Date.now()}
                            </div>
                        </div>
                    `;
                    
                    // Play sound effect (vibrate on mobile)
                    if (navigator.vibrate) navigator.vibrate(200);
                }
            }, 3000);
        };
        
        // Stop Bot
        window.stopBot = function() {
            if (!botRunning) return;
            botRunning = false;
            if (botInterval) clearInterval(botInterval);
            document.getElementById('botStatus').innerHTML = '● Stopped';
            document.getElementById('botStatus').style.color = 'var(--danger)';
            document.getElementById('signalDisplay').innerHTML = '<div style="text-align: center; color: var(--text-secondary); padding: 20px;">Bot stopped. Click Start to begin trading.</div>';
        };
        
        // Check auth state on load
        window.onAuthStateChanged(window.auth, async (user) => {
            if (user) {
                currentUser = user;
                const userDoc = await window.getDoc(window.doc(window.db, 'users', user.uid));
                if (userDoc.exists()) {
                    userData = userDoc.data();
                    showDashboard();
                } else {
                    // User exists in Auth but not in Firestore (shouldn't happen)
                    await window.signOut(window.auth);
                }
            }
        });
        
        // Initialize market data
        updateMarketData();
    </script>
</body>
</html>
